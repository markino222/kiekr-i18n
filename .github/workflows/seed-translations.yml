name: seed-translations

on:
  push:
    branches: [main]
    paths:
      - 'locales/en.json'
      - 'locales/de.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Register DEEPL_API_KEY as masked
        run: echo "::add-mask::${{ secrets.DEEPL_API_KEY }}"
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install deepl
      - run: python tools/seed.py
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Open PR with AI seeds
        uses: peter-evans/create-pull-request@v7
        with:
          # Prefer BOT_PAT so the PR triggers downstream workflows
          # (validate.yml). Falls back to GITHUB_TOKEN if no PAT —
          # PR will still open but the required `check` won't run
          # automatically; close+reopen the PR to trigger it.
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: bot/ai-seed
          delete-branch: true
          title: "chore(seed): DeepL translations for new/missing keys"
          commit-message: "chore(seed): DeepL translations for new/missing keys"
          body: |
            Machine-translated seeds for keys that were `null` in
            community locale files. Each value is flagged
            `_ai: true` until a human translator reviews it.

            Review tips:
              - Skim for placeholder integrity (`%1$s`, `%@`).
              - Check glossary terms — these went through the
                `glossary/<lang>.tsv` so consistent terminology
                should be preserved.
              - Flip `_ai: true` to `_human: true` (or replace the
                whole object with a plain string) on approval.
          labels: bot, ai-seed

      - name: Prune prior runs of this workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WF: ${{ github.workflow }}
          CURRENT: ${{ github.run_id }}
        run: |
          gh run list --repo "$REPO" --workflow "$WF" \
            --limit 100 --json databaseId \
            --jq ".[] | select(.databaseId != $CURRENT) | .databaseId" |
            while read -r id; do
              [ -n "$id" ] && gh run delete --repo "$REPO" "$id" || true
            done
