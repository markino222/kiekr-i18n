name: sync-keys

on:
  push:
    branches: [main]
    paths:
      - 'locales/en.json'
      - 'locales/de.json'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python tools/sync_keys.py
      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v7
        with:
          # Prefer BOT_PAT so the PR triggers downstream workflows.
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: bot/sync-keys
          delete-branch: true
          title: "chore(sync): align community locales to en.json keyset"
          commit-message: "chore(sync): align community locales to en.json keyset"
          body: |
            Automated alignment of community locale files to the
            current `en.json` keyset. New keys land as `null`;
            removed keys are dropped.
          labels: bot, sync

      - name: Prune prior runs of this workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WF: ${{ github.workflow }}
          CURRENT: ${{ github.run_id }}
        run: |
          gh run list --repo "$REPO" --workflow "$WF" \
            --limit 100 --json databaseId \
            --jq ".[] | select(.databaseId != $CURRENT) | .databaseId" |
            while read -r id; do
              [ -n "$id" ] && gh run delete --repo "$REPO" "$id" || true
            done
